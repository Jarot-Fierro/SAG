    <!--end::Theme Init-->

    <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/x-icon" href="{% static 'core/media/logo.ico' %}">
    <!--end::Accessibility Meta Tags-->

    <!--begin::Primary Meta Tags-->
    <meta name="title" content="AdminLTE 4 | Login Page v2">

    {% include 'core/components/subscomponents/styles.html' %}

<!--begin::Body-->
<body class="login-page bg-body-secondary app-loaded">
<div class="login-box">
    <div class="card card-outline card-primary">
        <div class="card-header text-center">
            <a class="link-dark text-center link-offset-2 link-opacity-100 link-opacity-50-hover"
               href="#">
                <img class="mb-0" src="{% static 'core/media/logo_trabajando.png' %}" alt="" width="250" height="100">
            </a>
        </div>
        <div class="card-body login-card-body">
            {% include 'core/components/messages.html' %}

            <p class="login-box-msg">Inicia sesión con tus credenciales</p>

            <form action="{% url 'usuarios:login' %}" method="post" id="loginForm">
                {% csrf_token %}
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                <div class="input-group mb-3">
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="Usuario"
                           aria-label="Username"
                           value="{{ form.username.value|default:'' }}"
                           required>
                    <div class="input-group-text">
                        <span class="bi bi-person"></span>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Contraseña"
                           aria-label="Password" required>
                    <div class="input-group-text">
                        <span class="bi bi-lock-fill"></span>
                    </div>
                </div>
                <!--begin::Row-->
                <div class="row">
                    <div class="col-4 d-inline-flex align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="remember_me" id="flexCheckDefault">
                            <label class="form-check-label" for="flexCheckDefault">Recuerdame</label>
                        </div>
                    </div>
                    <!-- /.col -->
                    <div class="col-8">
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
                        </div>
                    </div>
                    <!-- /.col -->
                </div>
                <!--end::Row-->
            </form>

            <!-- /.social-auth-links -->

            <p class="mb-1">
                <a href="forgot-password.html">Olvidé mi contraseña?</a>
            </p>
            <p class="mb-0">
                <a class="text-center" href="{% url 'usuarios:registro' %}">Registrate</a>
            </p>
        </div>
        <!-- /.login-card-body -->
    </div>
</div>
<!-- /.login-box -->

<!--begin::Third Party Plugin(OverlayScrollbars)-->
<script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"
        crossorigin="anonymous"></script>

<!--end::Required Plugin(AdminLTE)--><!--begin::OverlayScrollbars Configure-->
<script>
    const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
    const Default = {
        scrollbarTheme: 'os-theme-light',
        scrollbarAutoHide: 'leave',
        scrollbarClickScroll: true,
    };
    document.addEventListener('DOMContentLoaded', function () {
        const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);

        // Disable OverlayScrollbars on mobile devices to prevent touch interference
        const isMobile = window.innerWidth <= 992;

        if (
            sidebarWrapper &&
            OverlayScrollbarsGlobal?.OverlayScrollbars !== undefined &&
            !isMobile
        ) {
            OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
                scrollbars: {
                    theme: Default.scrollbarTheme,
                    autoHide: Default.scrollbarAutoHide,
                    clickScroll: Default.scrollbarClickScroll,
                },
            });
        }
    });
</script>
<!--end::OverlayScrollbars Configure--><!--begin::Color Mode Toggle (#6010)-->
<script>
    (() => {
        'use strict';
        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-bs-theme', 'light');
        };
        setTheme('light');
    })();
</script>
<!--end::Color Mode Toggle-->

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const usernameInput = document.getElementById('id_username');
        const loginForm = document.getElementById('loginForm');

        function formatRut(value) {
            // Quitar all lo que no sea número o k/K
            let rut = value.replace(/[^\dkK]/g, '').toUpperCase();
            if (rut.length <= 1) return rut;

            let dv = rut.slice(-1);
            let numbers = rut.slice(0, -1);

            // Formatear con puntos
            let formatted = '';
            for (let i = numbers.length - 1, j = 1; i >= 0; i--, j++) {
                formatted = numbers.charAt(i) + formatted;
                if (j % 3 === 0 && i !== 0) {
                    formatted = '.' + formatted;
                }
            }

            return formatted + '-' + dv;
        }

        usernameInput.addEventListener('input', function (e) {
            let cursorPosition = e.target.selectionStart;
            let oldLength = e.target.value.length;

            let formatted = formatRut(e.target.value);
            e.target.value = formatted;

            // Ajustar posición del cursor si es necesario
            let newLength = formatted.length;
            cursorPosition = cursorPosition + (newLength - oldLength);
            e.target.setSelectionRange(cursorPosition, cursorPosition);
        });

        loginForm.addEventListener('submit', function () {
            // Asegurar el formato final al enviar
            usernameInput.value = formatRut(usernameInput.value);
        });
    });
</script>
<!--end::Script-->


<div id="live-region" class="live-region" aria-live="polite" aria-atomic="true" role="status"></div>
</body><!--end::Body--></html>
