<html lang="es" data-bs-theme="light">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>SAG | {% block title %}{% endblock %}</title>
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'core/media/logo.ico' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'core/css/adminlte.css' %}">
    {% include 'core/components/subscomponents/styles.html' %}
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>
<body class="login-page bg-body-secondary">
{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
<script src="{% static 'core/js/adminlte.js' %}"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const usernameInput = document.getElementById('id_rut');
        if (usernameInput) {
            function formatRut(value) {
                let rut = value.replace(/[^\dkK]/g, '').toUpperCase();
                if (rut.length <= 1) return rut;
                let dv = rut.slice(-1);
                let numbers = rut.slice(0, -1);
                let formatted = '';
                for (let i = numbers.length - 1, j = 1; i >= 0; i--, j++) {
                    formatted = numbers.charAt(i) + formatted;
                    if (j % 3 === 0 && i !== 0) formatted = '.' + formatted;
                }
                return formatted + '-' + dv;
            }

            usernameInput.addEventListener('input', function (e) {
                let cursorPosition = e.target.selectionStart;
                let oldLength = e.target.value.length;
                let formatted = formatRut(e.target.value);
                e.target.value = formatted;
                let newLength = formatted.length;
                cursorPosition = cursorPosition + (newLength - oldLength);
                e.target.setSelectionRange(cursorPosition, cursorPosition);
            });
        }
    });
</script>
</body>
</html>
