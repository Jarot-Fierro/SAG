{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Listado de Anexos</title>
    <style>
        @page {
            size: 13in 8.5in landscape;
            margin: 0.5cm;
            @bottom-right {
                content: "Página " counter(page) " de " counter(pages);
                font-size: 8pt;
                color: #6c757d;
            }
        }

        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            font-size: 7.2pt;
            margin: 0;
            padding: 0;
            color: #212529;
            background-color: #fff;
        }

        .pdf-container {
            column-count: 6;
            column-gap: 5px;
            column-fill: auto;
            width: 100%;
        }

        .unidad-wrapper {
            break-inside: auto;
            margin-bottom: 8px;
            display: inline-block;
            width: 100%;
            background-color: #fff;
        }

        .unidad-header {
            width: 100%;
            border: 0.8pt solid #333;
            border-bottom: none;
            padding: 1px 2px;
            font-size: 8px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            break-after: avoid;
            box-sizing: border-box;
        }

        .anexos-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            border: 0.8pt solid #333;
        }

        .row-anexo {
            break-inside: avoid;
        }

        .cell-anexo {
            border: 0.5pt solid #333;
            padding: 1px 2px;
            text-align: center;
            vertical-align: middle;
            word-wrap: break-word;
            font-size: 6pt;
            width: 30%;
            font-weight: 700;
        }

        .cell-funcionario {
            border: 0.5pt solid #333;
            padding: 1px 2px;
            text-align: left;
            vertical-align: middle;
            word-wrap: break-word;
            font-size: 6px;
            width: 70%;
        }
    </style>
</head>
<body>

<div class="pdf-container">
    {% for unidad in unidades %}
        <div class="unidad-wrapper">

            <table class="anexos-table">
                <thead>
                <tr>
                    <th colspan="6" class="cell-anexo" style="background-color: {{ unidad.color }};">
                        {{ unidad.nombre }}
                    </th>
                </tr>
                </thead>
                <tbody>
                {% for anexo in unidad.anexos_list %}
                    <tr class="row-anexo">
                        <td colspan="2" class="cell-anexo">
                            {{ anexo.anexo }}
                        </td>
                        <td colspan="4" class="cell-funcionario">
                            {% if anexo.funcionario %}
                                <strong>{{ anexo.funcionario.nombres|default:"" }} {{ anexo.funcionario.apellidos|default:"" }}</strong>
                            {% endif %}
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    {% endfor %}
</div>

</body>
</html>
